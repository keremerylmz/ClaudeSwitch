name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Runs before publishing: JsonSurgeon rewrites the user's ~/.claude.json in place,
      # so a regression there would corrupt real installs.
      - name: Test
        run: dotnet run --project tests/SurgeonTests -c Release --nologo

      - name: Publish (self-contained)
        run: >
          dotnet publish src/ClaudeSwitch/ClaudeSwitch.csproj
          -c Release -r win-x64 --self-contained true
          -o publish/standalone --nologo

      - name: Publish (framework-dependent)
        run: >
          dotnet publish src/ClaudeSwitch/ClaudeSwitch.csproj
          -c Release -r win-x64 --self-contained false
          -o publish/lite --nologo

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item publish/standalone/ClaudeSwitch.exe dist/ClaudeSwitch.exe
          Copy-Item publish/lite/ClaudeSwitch.exe        dist/ClaudeSwitch-lite.exe

          # The in-app updater verifies its download against this before swapping the exe in,
          # so a truncated or corrupted transfer can never become the installed build.
          Get-ChildItem dist -Filter *.exe | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          } | Set-Content dist/SHA256SUMS.txt -Encoding ascii

          Get-ChildItem dist | Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}
          Get-Content dist/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ClaudeSwitch
          path: dist/*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Downloads

            | File | When to use it |
            |---|---|
            | `ClaudeSwitch-standalone.exe` | Most people. Nothing to install. |
            | `ClaudeSwitch-lite.exe` | If you already have the [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0). |

            These builds are unsigned; if SmartScreen warns you,
            click **More info → Run anyway**.
