<svg width="880" height="240" viewBox="0 0 880 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ClaudeSwitch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="880" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A19"/>
      <stop offset="1" stop-color="#26211E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D97757"/>
      <stop offset="1" stop-color="#C96442"/>
    </linearGradient>
  </defs>

  <rect width="880" height="240" rx="20" fill="url(#bg)"/>

  <!-- app-icon tile: rounded square + two switch arrows -->
  <g transform="translate(56,76)">
    <rect width="88" height="88" rx="22" fill="url(#accent)"/>
    <g stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M26 34 H62"/>
      <path d="M53 25 L62 34 L53 43"/>
      <path d="M62 54 H26"/>
      <path d="M35 45 L26 54 L35 63"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="176" y="112" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#FFFFFF">ClaudeSwitch</text>
  <text x="178" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="400" fill="#B8B0A8">One-click Claude Code account switcher for CLI &amp; VS Code</text>

  <!-- tag chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">
    <g transform="translate(178,172)">
      <rect width="150" height="30" rx="15" fill="#2E2925" stroke="#3D3733"/>
      <text x="16" y="20" fill="#D97757">↺ Resume sessions</text>
    </g>
    <g transform="translate(338,172)">
      <rect width="132" height="30" rx="15" fill="#2E2925" stroke="#3D3733"/>
      <text x="16" y="20" fill="#7FB89B">◆ Real usage %</text>
    </g>
    <g transform="translate(480,172)">
      <rect width="150" height="30" rx="15" fill="#2E2925" stroke="#3D3733"/>
      <text x="16" y="20" fill="#9FB4D9">◈ DPAPI-encrypted</text>
    </g>
  </g>
</svg>
