<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ClaudeSwitch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141110"/>
      <stop offset="1" stop-color="#1C1613"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.34" r="0.55">
      <stop stop-color="#D97757" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E0876B"/><stop offset="1" stop-color="#C96442"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" fill-opacity="0.022"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .s { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1000" height="430" rx="22" fill="url(#bg)"/>
  <rect width="1000" height="430" rx="22" fill="url(#dots)"/>
  <rect width="1000" height="430" rx="22" fill="url(#glow)"/>

  <!-- ── left: copy ─────────────────────────────────────── -->
  <g transform="translate(60,58)">
    <rect width="30" height="30" rx="8" fill="url(#tile)"/>
    <g stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M9 11.5 H21"/><path d="M17.5 8 L21 11.5 L17.5 15"/>
      <path d="M21 18.5 H9"/><path d="M12.5 15 L9 18.5 L12.5 22"/>
    </g>
    <text x="42" y="21" class="s" font-size="17" font-weight="600" fill="#F2ECE7" letter-spacing="0.2">ClaudeSwitch</text>
  </g>

  <text x="60" y="176" class="s" font-size="43" font-weight="700" fill="#F7F3EF" letter-spacing="-0.5">Switch Claude accounts</text>
  <text x="60" y="224" class="s" font-size="43" font-weight="700" fill="#F7F3EF" letter-spacing="-0.5">without losing your place.</text>

  <text x="61" y="266" class="s" font-size="15.5" fill="#A79E96">One click swaps your account across the CLI, the VS Code</text>
  <text x="61" y="289" class="s" font-size="15.5" fill="#A79E96">extension, and Claude Desktop — same session, no restart.</text>

  <!-- thin accent rule -->
  <rect x="61" y="318" width="38" height="3" rx="1.5" fill="#D97757"/>

  <!-- feature row with mid-dots -->
  <g class="s" font-size="13.5" font-weight="500" transform="translate(61,352)">
    <text x="0" y="0" fill="#CFC7BF">Real usage %</text>
    <circle cx="98" cy="-4" r="2" fill="#5A524C"/>
    <text x="114" y="0" fill="#CFC7BF">CLI · VS Code · Desktop</text>
    <circle cx="296" cy="-4" r="2" fill="#5A524C"/>
    <text x="312" y="0" fill="#CFC7BF">Encrypted</text>
  </g>

  <!-- small meta line -->
  <text x="61" y="392" class="s" font-size="12.5" fill="#6E665F">Free · open source · MIT · Windows</text>

  <!-- ── right: the real app window, floating ───────────── -->
  <g transform="translate(628,54)" filter="url(#shadow)">
    <rect width="322" height="322" rx="15" fill="#FFFFFF"/>

    <!-- header -->
    <rect width="322" height="58" rx="15" fill="#FAFAF9"/>
    <rect y="43" width="322" height="15" fill="#FAFAF9"/>
    <rect y="57" width="322" height="1" fill="#ECEAE6"/>
    <rect x="18" y="20" width="18" height="18" rx="5" fill="url(#tile)"/>
    <text x="44" y="34" class="s" font-size="13" font-weight="700" fill="#1A1A19">ClaudeSwitch</text>
    <text x="304" y="34" class="s" font-size="14" fill="#A8A29B" text-anchor="end">⟳</text>

    <!-- active account card -->
    <g transform="translate(16,74)">
      <rect width="290" height="106" rx="11" fill="#FBF0EC" stroke="#D97757" stroke-width="1.2"/>
      <circle cx="34" cy="30" r="16" fill="#F6E0D8"/>
      <text x="34" y="35" class="s" font-size="14" font-weight="700" fill="#C96442" text-anchor="middle">Y</text>
      <text x="60" y="27" class="s" font-size="13.5" font-weight="700" fill="#1A1A19">you@example.com</text>
      <text x="60" y="44" class="s" font-size="11.5" fill="#8A837C">Ready</text>
      <g transform="translate(206,18)">
        <rect width="34" height="20" rx="5" fill="#F1EEEA"/><text x="17" y="14" class="s" font-size="10" font-weight="700" fill="#8A837C" text-anchor="middle">MAX</text>
        <rect x="40" y="0" width="42" height="20" rx="5" fill="#FFFFFF" stroke="#E6E2DD"/><text x="61" y="14" class="s" font-size="10" font-weight="600" fill="#B0AAA3" text-anchor="middle">Active</text>
      </g>
      <!-- usage -->
      <text x="18" y="76" class="s" font-size="11.5" fill="#8A837C">5-hour</text>
      <text x="272" y="76" class="s" font-size="12" font-weight="700" fill="#1A1A19" text-anchor="end">24%</text>
      <rect x="18" y="84" width="254" height="6" rx="3" fill="#EFEDE9"/>
      <rect x="18" y="84" width="61" height="6" rx="3" fill="#2F7A5B"/>
    </g>

    <!-- second account card -->
    <g transform="translate(16,190)">
      <rect width="290" height="106" rx="11" fill="#FFFFFF" stroke="#ECEAE6"/>
      <circle cx="34" cy="30" r="16" fill="#F0EEEA"/>
      <text x="34" y="35" class="s" font-size="14" font-weight="700" fill="#8A837C" text-anchor="middle">W</text>
      <text x="60" y="27" class="s" font-size="13.5" font-weight="700" fill="#1A1A19">work@example.com</text>
      <text x="60" y="44" class="s" font-size="11.5" fill="#8A837C">Ready</text>
      <g transform="translate(198,18)">
        <rect width="36" height="20" rx="5" fill="#F1EEEA"/><text x="18" y="14" class="s" font-size="10" font-weight="700" fill="#8A837C" text-anchor="middle">PRO</text>
        <rect x="42" y="0" width="48" height="20" rx="5" fill="#C96442"/><text x="66" y="14" class="s" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">Switch</text>
      </g>
      <text x="18" y="76" class="s" font-size="11.5" fill="#8A837C">5-hour</text>
      <text x="272" y="76" class="s" font-size="12" font-weight="700" fill="#1A1A19" text-anchor="end">6%</text>
      <rect x="18" y="84" width="254" height="6" rx="3" fill="#EFEDE9"/>
      <rect x="18" y="84" width="15" height="6" rx="3" fill="#2F7A5B"/>
    </g>
  </g>
</svg>
