<svg width="1000" height="440" viewBox="0 0 1000 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ClaudeSwitch hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12100E"/>
      <stop offset="1" stop-color="#1E1712"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E0876B"/>
      <stop offset="1" stop-color="#C96442"/>
    </linearGradient>
    <linearGradient id="redbar" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C96442"/>
      <stop offset="1" stop-color="#B4443A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.5">
      <stop stop-color="#C96442" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C96442" stop-opacity="0"/>
    </radialGradient>
    <style>
      .h  { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
      .mono { font-family: 'Cascadia Code', 'Consolas', monospace; }
    </style>
  </defs>

  <rect width="1000" height="440" rx="20" fill="url(#bg)"/>
  <rect width="1000" height="440" rx="20" fill="url(#glow)"/>

  <!-- ── left column ─────────────────────────────────────── -->

  <!-- brand -->
  <g transform="translate(48,44)">
    <rect width="30" height="30" rx="8" fill="url(#accent)"/>
    <g stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M9 11.5 H21"/><path d="M17.5 8 L21 11.5 L17.5 15"/>
      <path d="M21 18.5 H9"/><path d="M12.5 15 L9 18.5 L12.5 22"/>
    </g>
    <text x="42" y="21" class="h" font-size="18" font-weight="700" fill="#F5EFEA">ClaudeSwitch</text>
  </g>

  <!-- accent tagline -->
  <text x="48" y="120" class="h" font-size="15" font-weight="600" fill="#E0876B">Never lose your place switching accounts.</text>

  <!-- headline -->
  <text x="46" y="176" class="h" font-size="40" font-weight="800" fill="#FBF7F4">Hit your limit at 2am?</text>
  <text x="46" y="224" class="h" font-size="40" font-weight="800" fill="#FBF7F4">Switch and keep going.</text>

  <!-- description -->
  <text x="48" y="266" class="h" font-size="15" fill="#B8AEA6">One click swaps your account across the Claude Code CLI,</text>
  <text x="48" y="288" class="h" font-size="15" fill="#B8AEA6">the VS Code extension, and Claude Desktop — same session,</text>
  <text x="48" y="310" class="h" font-size="15" fill="#B8AEA6">no restart. Just type “continue”.</text>

  <!-- command / flow pill -->
  <g transform="translate(48,336)">
    <rect width="470" height="40" rx="9" fill="#0C0B0A" stroke="#2E2723"/>
    <text x="16" y="26" class="mono" font-size="14" fill="#7FB89B">▸</text>
    <text x="36" y="26" class="mono" font-size="14" fill="#CFC7BF">switch  →  <tspan fill="#E0876B">"continue"</tspan>  →  right back where you were</text>
  </g>

  <!-- feature chips -->
  <g class="h" font-size="12.5" font-weight="600" transform="translate(48,398)">
    <g><rect width="118" height="26" rx="13" fill="#241E1A" stroke="#37302B"/><text x="15" y="17" fill="#E0876B">◆ real usage %</text></g>
    <g transform="translate(128,0)"><rect width="150" height="26" rx="13" fill="#241E1A" stroke="#37302B"/><text x="15" y="17" fill="#9FB4D9">◈ DPAPI-encrypted</text></g>
    <g transform="translate(288,0)"><rect width="96" height="26" rx="13" fill="#241E1A" stroke="#37302B"/><text x="15" y="17" fill="#8FBFA6">◆ Windows</text></g>
    <g transform="translate(394,0)"><rect width="66" height="26" rx="13" fill="#241E1A" stroke="#37302B"/><text x="15" y="17" fill="#9A928B">MIT</text></g>
  </g>

  <!-- ── right widget: the switch, before → after ───────────── -->
  <g transform="translate(620,70)">
    <rect width="330" height="300" rx="16" fill="#161311" stroke="#2C2521"/>

    <text x="24" y="40" class="h" font-size="11" font-weight="700" letter-spacing="1.5" fill="#8A817A">CURRENT ACCOUNT</text>

    <!-- before: near the limit -->
    <g transform="translate(24,54)">
      <circle cx="15" cy="15" r="15" fill="#2A211D"/>
      <text x="15" y="20" class="h" font-size="13" font-weight="700" fill="#E0876B" text-anchor="middle">K</text>
      <text x="42" y="14" class="h" font-size="13.5" font-weight="700" fill="#F0EAE5">you@example.com</text>
      <text x="42" y="31" class="h" font-size="11.5" fill="#8A817A">MAX · 5-hour limit</text>

      <rect x="0" y="48" width="282" height="7" rx="3.5" fill="#241E1A"/>
      <rect x="0" y="48" width="262" height="7" rx="3.5" fill="url(#redbar)"/>
      <text x="0" y="76" class="h" font-size="12" fill="#B8AEA6">93% used</text>
      <text x="282" y="76" class="h" font-size="12" font-weight="700" fill="#C96442" text-anchor="end">resets in 4h 12m</text>
    </g>

    <!-- switch arrow -->
    <g transform="translate(0,168)">
      <line x1="24" y1="0" x2="306" y2="0" stroke="#2C2521"/>
      <g transform="translate(141,-12)">
        <circle cx="12" cy="12" r="14" fill="url(#accent)"/>
        <g stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path d="M6 9 H18"/><path d="M15 6.5 L18 9 L15 11.5"/>
          <path d="M18 15 H6"/><path d="M9 12.5 L6 15 L9 17.5"/>
        </g>
      </g>
    </g>

    <!-- after: fresh account -->
    <g transform="translate(24,206)">
      <circle cx="15" cy="15" r="15" fill="#1D2A22"/>
      <text x="15" y="20" class="h" font-size="13" font-weight="700" fill="#8FBFA6" text-anchor="middle">W</text>
      <text x="42" y="14" class="h" font-size="13.5" font-weight="700" fill="#F0EAE5">work@example.com</text>
      <text x="42" y="31" class="h" font-size="11.5" fill="#8A817A">MAX · fresh window</text>

      <rect x="0" y="48" width="282" height="7" rx="3.5" fill="#241E1A"/>
      <rect x="0" y="48" width="34" height="7" rx="3.5" fill="#2F7A5B"/>
      <text x="0" y="76" class="h" font-size="12" fill="#B8AEA6">4% used</text>
      <text x="282" y="76" class="h" font-size="12" font-weight="700" fill="#5FA37F" text-anchor="end">✓ keep going</text>
    </g>
  </g>
</svg>
